name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # 也可以手動觸發
  workflow_dispatch:

# 允許這個 workflow 對 Pages 寫入
permissions:
  contents: read
  pages: write
  id-token: write

# 同時只跑一個部署，新的推送會取消舊的
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # 完整歷史讓 VitePress lastUpdated 抓得到 commit 時間

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true   # 第一次部署自動啟用 Pages（雙保險、即使已用 gh API 啟用過也安全）

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint glossary (non-blocking)
        continue-on-error: true
        run: |
          echo "## Lint: glossary" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npm run lint:glossary 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Lint TLDR (non-blocking)
        continue-on-error: true
        run: |
          echo "## Lint: TLDR" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npm run lint:tldr 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Build VitePress
        env:
          GITHUB_PAGES: "true"  # 觸發 config.mts 的 base = '/ddia-zh/'
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
