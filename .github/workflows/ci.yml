name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# 同一個 PR 只跑一輪、推新 commit 取消舊 run
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint glossary (non-blocking)
        continue-on-error: true
        run: |
          echo "## Lint: glossary" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npm run lint:glossary 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Lint TLDR (non-blocking)
        continue-on-error: true
        run: |
          echo "## Lint: TLDR" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npm run lint:tldr 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Build (validate SSG renders all pages)
        env:
          GITHUB_PAGES: "true"
        run: npm run build
