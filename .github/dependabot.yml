version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      vitepress-stack:
        patterns:
          - "vitepress"
          - "vue"
          - "vue-tsc"
      dev-tooling:
        patterns:
          - "typescript"
          - "@types/*"
          - "playwright"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
